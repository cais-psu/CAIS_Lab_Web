# site properties and page defaults
title: cais-psu
subtitle: 
description: Research in the Control and Automation for Intelligent Systems Lab focuses on developing, analyzing, and applying control theory and artificial intelligence to improve the safety, flexibility, and performance of complex, dynamic systems, such as manufacturing systems.
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
  email: iqk5135@psu.edu
  orcid: 0000-0001-8713-9213
  google-scholar: secQmYUAAAAJ&hl
  github: cais-psu
  twitter: cais-psu
  youtube: cais-psu

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
